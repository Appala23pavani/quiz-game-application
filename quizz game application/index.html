<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game Application</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<!-- Theme Toggle -->
<div class="top-bar">
    <button id="theme-btn">🌙 Dark Mode</button>
</div>

<!-- Quiz Container -->
<div class="quiz-container">

    <!-- Quiz Header -->
    <div class="quiz-header">

        <h1>🎯 Quiz Game</h1>

        <p>Test Your HTML, CSS & JavaScript Skills</p>

    </div>

    <!-- Progress -->
    <div class="progress-container">

        <div class="progress-info">

            <span id="question-number">
                Question 1 / 10
            </span>

            <span id="timer">
                ⏳ 15s
            </span>

        </div>

        <div class="progress">

            <div id="progress-bar"></div>

        </div>

    </div>

    <!-- Question -->
    <div class="question-area">

        <h2 id="question">
            Loading Question...
        </h2>

    </div>

    <!-- Answer Buttons -->

    <div id="answer-buttons" class="btn-grid">

        <!-- JavaScript Generates Buttons -->

    </div>

    <!-- Navigation -->

    <div class="navigation">

        <button id="prev-btn" class="nav-btn">

            ⬅ Previous

        </button>

        <button id="next-btn" class="nav-btn">

            Next ➜

        </button>

    </div>

    <!-- Score -->

    <div class="score-board">

        <h3>

            ⭐ Score:
            <span id="score">

                0

            </span>

        </h3>

        <h3>

            🏆 High Score:
            <span id="high-score">

                0

            </span>

        </h3>

    </div>

</div>

<!-- Result Screen -->

<div id="result-box" class="result-box hidden">

    <h1>

        🎉 Quiz Completed!

    </h1>

    <h2>

        Your Score

    </h2>

    <h1>

        <span id="final-score">

            0

        </span>

        /

        10

    </h1>

    <p id="result-message">

    </p>

    <button id="restart-btn">

        🔄 Restart Quiz

    </button>

</div>

<!-- Audio -->

<audio id="correct-sound">

    <source src="correct.mp3" type="audio/mpeg">

</audio>

<audio id="wrong-sound">

    <source src="wrong.mp3" type="audio/mpeg">

</audio>

<!-- Confetti -->

<canvas id="confetti"></canvas>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<script src="script.js"></script>

</body>
</html>
